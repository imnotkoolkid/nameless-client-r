<style>
  .nlc-keys-overlay {
    display: flex;
    flex-direction: column;
    max-width: 688px
  }

  .nlc-key-row {
    display: flex;
    flex-direction: row;
    margin-bottom: .25rem
  }

  .nlc-key-default {
    display: grid;
    place-items: center;
    color: var(--nlc-letter-clr);
    border: 2px solid var(--nlc-key-clr);
    margin-right: .25rem;
    transform: skew(var(--nlc-skew));
    border-radius: .25rem;
    max-height: 36px;
    height: 36px;
    width: 36px;
    min-width: 36px;
    user-select: none;
    text-transform: uppercase;
    opacity: var(--nlc-key-opacity);
    font-size: var(--nlc-letter-size)
  }

  .nlc-key-default.nlc-key-active {
    color: black;
    background: white
  }

  .nlc-key-blank {
    border-color: transparent;
    cursor: auto
  }

  .nlc-key-blank:hover {
    background: transparent
  }

  .nlc-key-wide {
    width: 100%;
    padding: 0 .5rem;
    text-transform: lowercase
  }

  .nlc-key-modifier {
    text-transform: lowercase
  }

  .nlc-key-ultrawide {
    max-width: 350px;
    width: 100%
  }

  #key-row-three .nlc-key-wide {
    max-width: 70px;
    min-width: 70px
  }

  #key-row-three .nlc-key-wide:last-child {
    max-width: 60px;
    min-width: unset
  }

  #key-row-four .nlc-key-wide {
    max-width: 85px
  }

  #key-row-four .nlc-key-wide:last-child {
    max-width: unset
  }

  #key-row-five .nlc-key-wide {
    max-width: 95px
  }

  #key-row-five .nlc-key-wide:last-child {
    max-width: 120px
  }

  #key-row-six .nlc-key-wide {
    max-width: 55px
  }

  .nlc-key-default:last-child {
    margin: 0
  }

  p {
    margin: 0
  }

  .nlc-keys-overlay:not(.edit) .nlc-key-disabled {
    display: none !important
  }

  .nlc-keys-overlay.edit {
    pointer-events: all
  }

  .nlc-keys-overlay.edit .nlc-key-default {
    cursor: pointer
  }

  .nlc-keys-overlay.edit .nlc-key-disabled {
    opacity: .75;
    --nlc-key-clr: #f00 !important;
    --nlc-letter-clr: #f00 !important;
    color: #f00 !important;
    border-color: #f00 !important
  }

  .nlc-keys-overlay.edit .nlc-key-disabled p,
  .nlc-keys-overlay.edit .nlc-key-disabled.nlc-key-active,
  .nlc-keys-overlay.edit .nlc-key-disabled.nlc-key-active p {
    color: #f00 !important
  }

  .nlc-keys-overlay.edit .nlc-key-disabled.nlc-key-active {
    background: transparent !important;
    border-color: #f00 !important
  }
</style>
